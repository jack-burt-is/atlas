<!-- @dsCard group="Spacing" viewport="700x176" name="Corner radii" subtitle="From control radius to pill — cards use radius-lg (14px)" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--bg-app);font-family:var(--font-sans);display:flex;gap:20px;align-items:flex-end}
  .sw{display:flex;flex-direction:column;gap:8px;align-items:center}
  .box{width:84px;height:64px;background:var(--surface-raised);border:1px solid var(--border-strong);border-bottom:none;border-right:none}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)}
  .px{font-family:var(--font-mono);font-size:9px;color:var(--text-faint)}
</style></head><body>
  <div class="sw"><div class="box" style="border-radius:8px"></div><span class="nm">sm</span><span class="px">8</span></div>
  <div class="sw"><div class="box" style="border-radius:10px"></div><span class="nm">md</span><span class="px">10</span></div>
  <div class="sw"><div class="box" style="border-radius:14px"></div><span class="nm">lg · card</span><span class="px">14</span></div>
  <div class="sw"><div class="box" style="border-radius:18px"></div><span class="nm">xl</span><span class="px">18</span></div>
  <div class="sw"><div class="box" style="border-radius:24px"></div><span class="nm">2xl</span><span class="px">24</span></div>
  <div class="sw"><div class="box" style="border-radius:999px;width:120px"></div><span class="nm">pill</span><span class="px">999</span></div>
</body></html>
