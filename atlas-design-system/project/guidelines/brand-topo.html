<!-- @dsCard group="Brand" viewport="700x200" name="Topographic motif" subtitle="Signature contour texture + ambient glow — .atlas-topo on any surface" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;background:var(--bg-app);font-family:var(--font-sans)}
  .stage{height:200px;display:flex;align-items:center;padding:0 34px;position:relative}
  .copy{position:relative;z-index:2}
  .eyebrow3{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold-400)}
  h3{font:var(--fw-bold) 30px var(--font-display);color:var(--text-primary);margin:8px 0 6px;letter-spacing:-.02em}
  p{font-size:14px;color:var(--text-muted);margin:0;max-width:360px}
</style></head><body>
<div class="stage atlas-topo" style="background-image:radial-gradient(900px 400px at 85% -20%, rgba(244,183,64,.14), transparent 60%), url('../assets/topo-contours.svg');background-repeat:no-repeat,repeat;background-size:auto,560px 560px">
  <div class="copy">
    <span class="eyebrow3">Brand texture</span>
    <h3>Every surface is a map</h3>
    <p>Faint contour lines and a warm summit glow give Atlas its premium, cartographic feel.</p>
  </div>
</div>
</body></html>
