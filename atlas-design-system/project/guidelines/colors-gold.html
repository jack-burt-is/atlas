<!-- @dsCard group="Colors" viewport="700x190" name="Summit Gold · primary" subtitle="The Atlas brand color — achievement, completion, score, premium CTAs" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 24px;background:var(--bg-app);font-family:var(--font-sans)}
  .row{display:flex;gap:12px;align-items:flex-end}
  .sw{display:flex;flex-direction:column;gap:7px}
  .chip{width:108px;height:64px;border-radius:10px;border:1px solid var(--border-subtle)}
  .big{width:140px;height:84px;box-shadow:var(--glow-gold-md)}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)}
  .hx{font-family:var(--font-mono);font-size:9px;color:var(--text-faint)}
  .tag{font-family:var(--font-mono);font-size:9px;color:var(--gold-400);text-transform:uppercase;letter-spacing:.12em}
</style></head><body>
<div class="row">
  <div class="sw"><span class="tag">primary</span><div class="chip big" style="background:var(--gold-500)"></div><span class="nm">gold-500</span><span class="hx">#F4B740</span></div>
  <div class="sw"><div class="chip" style="background:var(--gold-300)"></div><span class="nm">gold-300</span><span class="hx">#FFD888</span></div>
  <div class="sw"><div class="chip" style="background:var(--gold-400)"></div><span class="nm">gold-400</span><span class="hx">#FBC555</span></div>
  <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><span class="nm">gold-600</span><span class="hx">#E0A026</span></div>
  <div class="sw"><div class="chip" style="background:var(--gold-700)"></div><span class="nm">gold-700</span><span class="hx">#B87C14</span></div>
  <div class="sw"><div class="chip" style="background:var(--accent-soft);border-color:var(--border-gold)"></div><span class="nm">accent-soft</span><span class="hx">12% tint</span></div>
</div>
</body></html>
