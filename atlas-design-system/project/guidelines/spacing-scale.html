<!-- @dsCard group="Spacing" viewport="700x176" name="Spacing scale" subtitle="4px base grid — space-1 through space-10" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--bg-app);font-family:var(--font-sans)}
  .row{display:flex;gap:18px;align-items:flex-end}
  .sw{display:flex;flex-direction:column;gap:8px;align-items:center}
  .bar{background:var(--accent-soft-2);border:1px solid var(--border-gold);border-radius:4px;width:var(--w)}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)}
  .px{font-family:var(--font-mono);font-size:9px;color:var(--text-faint)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="bar" style="--w:4px;height:48px"></div><span class="nm">1</span><span class="px">4</span></div>
  <div class="sw"><div class="bar" style="--w:8px;height:48px"></div><span class="nm">2</span><span class="px">8</span></div>
  <div class="sw"><div class="bar" style="--w:12px;height:48px"></div><span class="nm">3</span><span class="px">12</span></div>
  <div class="sw"><div class="bar" style="--w:16px;height:48px"></div><span class="nm">4</span><span class="px">16</span></div>
  <div class="sw"><div class="bar" style="--w:20px;height:48px"></div><span class="nm">5</span><span class="px">20</span></div>
  <div class="sw"><div class="bar" style="--w:24px;height:48px"></div><span class="nm">6</span><span class="px">24</span></div>
  <div class="sw"><div class="bar" style="--w:32px;height:48px"></div><span class="nm">7</span><span class="px">32</span></div>
  <div class="sw"><div class="bar" style="--w:40px;height:48px"></div><span class="nm">8</span><span class="px">40</span></div>
  <div class="sw"><div class="bar" style="--w:48px;height:48px"></div><span class="nm">9</span><span class="px">48</span></div>
  <div class="sw"><div class="bar" style="--w:64px;height:48px"></div><span class="nm">10</span><span class="px">64</span></div>
</div>
</body></html>
