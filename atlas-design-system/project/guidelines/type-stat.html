<!-- @dsCard group="Type" viewport="700x190" name="Stat numerals" subtitle="Big tabular figures for progress, score and counts — the product's heartbeat" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 26px;background:var(--bg-app);display:flex;gap:44px;align-items:center}
  .stat{font-family:var(--font-display);font-weight:700;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.02em}
  .unit{color:var(--text-muted);font-weight:500}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.12em;margin-top:10px;display:block}
  .item{display:flex;flex-direction:column}
</style></head><body>
<div class="item"><div class="stat atlas-gold-text" style="font-size:64px">14,820</div><span class="cap">Outdoor Score</span></div>
<div class="item"><div class="stat" style="font-size:56px;color:var(--text-primary)">43<span class="unit" style="font-size:30px"> / 282</span></div><span class="cap">Munros climbed</span></div>
<div class="item"><div class="stat" style="font-size:56px;color:var(--spruce-400)">68%</div><span class="cap">Lake District</span></div>
</body></html>
