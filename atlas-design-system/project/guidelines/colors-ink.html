<!-- @dsCard group="Colors" viewport="700x172" name="Ink · neutral scale" subtitle="Cool cartographic-night neutrals, app background to primary text" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 24px;background:var(--bg-app);font-family:var(--font-sans)}
  .row{display:flex;gap:10px}
  .sw{display:flex;flex-direction:column;gap:7px;flex:1}
  .chip{height:60px;border-radius:9px;border:1px solid var(--border-subtle)}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);letter-spacing:.02em}
  .hx{font-family:var(--font-mono);font-size:9px;color:var(--text-faint)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><span class="nm">ink-950</span><span class="hx">#090C10</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="nm">ink-900</span><span class="hx">#0C1117</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><span class="nm">ink-800</span><span class="hx">#161D26</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><span class="nm">ink-700</span><span class="hx">#222E3A</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><span class="nm">ink-600</span><span class="hx">#2E3C49</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><span class="nm">ink-400</span><span class="hx">#566777</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><span class="nm">ink-300</span><span class="hx">#7D8D9C</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-200)"></div><span class="nm">ink-200</span><span class="hx">#A9B7C3</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-100)"></div><span class="nm">ink-100</span><span class="hx">#D2DBE3</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-50)"></div><span class="nm">ink-50</span><span class="hx">#EAEFF3</span></div>
</div>
</body></html>
