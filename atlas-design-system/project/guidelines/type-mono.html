<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--bg-app);font-family:var(--font-mono);color:var(--text-secondary)}
  .eyebrow2{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold-400)}
  .coord{font-size:15px;color:var(--text-primary);margin:14px 0 4px}
  .data{font-size:13px;color:var(--text-muted);display:flex;gap:24px;flex-wrap:wrap}
  .data b{color:var(--text-secondary);font-weight:700}
  .meta{font-size:10px;color:var(--text-faint);margin-top:16px}
</style></head><body>
<div class="eyebrow2">SUMMIT · TRIG POINT</div>
<div class="coord">54.4609° N, 3.2110° W</div>
<div class="data">
  <span>ELEV <b>978 m</b></span>
  <span>PROMINENCE <b>912 m</b></span>
  <span>VISITS <b>3</b></span>
  <span>FIRST <b>2021-06-14</b></span>
</div>
<div class="meta">Space Mono · 400 / 700 · uppercase · tracking 0.08–0.16em</div>
</body></html>
