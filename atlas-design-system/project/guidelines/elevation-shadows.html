<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & gold glow" subtitle="Soft shadows for depth; the gold glow signals achievement & emphasis" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px 26px;background:var(--bg-base);font-family:var(--font-sans);display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:12px;align-items:center}
  .box{width:104px;height:68px;background:var(--surface-card);border-radius:var(--radius-lg);border:1px solid var(--border-subtle)}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)}
</style></head><body>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="nm">shadow-sm</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="nm">shadow-md</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="nm">shadow-lg</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--glow-gold-sm)"></div><span class="nm">glow-gold-sm</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--glow-gold-md);border-color:var(--border-gold)"></div><span class="nm">glow-gold-md</span></div>
</body></html>
