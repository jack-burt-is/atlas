<!-- @dsCard group="Colors" viewport="700x180" name="Achievement tiers" subtitle="Bronze · Silver · Gold · Platinum — medal tiers with signature glow" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px 24px;background:var(--bg-app);font-family:var(--font-sans)}
  .row{display:flex;gap:26px;justify-content:space-between}
  .sw{display:flex;flex-direction:column;align-items:center;gap:12px}
  .medal{width:72px;height:72px;border-radius:50%;display:grid;place-items:center;font:var(--fw-bold) 22px var(--font-display);color:var(--ink-950)}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.1em}
  .hx{font-family:var(--font-mono);font-size:9px;color:var(--text-faint)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="medal" style="background:var(--tier-bronze);box-shadow:var(--glow-bronze)">III</div><span class="nm" style="color:var(--tier-bronze)">Bronze</span><span class="hx">#C77B43</span></div>
  <div class="sw"><div class="medal" style="background:var(--tier-silver);box-shadow:var(--glow-silver)">II</div><span class="nm" style="color:var(--tier-silver)">Silver</span><span class="hx">#B4C1CD</span></div>
  <div class="sw"><div class="medal" style="background:var(--tier-gold);box-shadow:var(--glow-gold-md)">I</div><span class="nm" style="color:var(--tier-gold)">Gold</span><span class="hx">#F4B740</span></div>
  <div class="sw"><div class="medal" style="background:var(--tier-platinum);box-shadow:var(--glow-platinum)">★</div><span class="nm" style="color:var(--tier-platinum)">Platinum</span><span class="hx">#8FE0E6</span></div>
</div>
</body></html>
